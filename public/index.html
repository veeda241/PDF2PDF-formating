<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF2JSON - PDF Parser & JSON Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f0883e;
    --danger: #f85149;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header .subtitle {
    color: var(--text-dim);
    font-size: 14px;
  }

  .header-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--accent2);
  }

  /* Main Layout */
  .main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    height: calc(100vh - 73px);
  }

  /* Left Panel */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-section h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* Upload Area */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .upload-area:hover, .upload-area.dragover {
    border-color: var(--accent);
    background: rgba(88,166,255,0.05);
  }

  .upload-area.processing {
    border-color: var(--accent3);
    background: rgba(240,136,62,0.05);
  }

  .upload-icon {
    font-size: 42px;
    margin-bottom: 10px;
    display: block;
  }

  .upload-text {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--text-dim);
  }

  .upload-input {
    display: none;
  }

  /* Progress Bar */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: var(--accent);
    transition: width 0.3s;
    border-radius: 0 3px 0 0;
  }

  /* Conversion List */
  .conversion-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .conversion-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .conversion-item:hover {
    border-color: var(--accent);
    transform: translateX(3px);
  }

  .conversion-item.active {
    border-color: var(--accent);
    background: rgba(88,166,255,0.08);
  }

  .conv-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
  }

  .conv-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .conv-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .conv-badge {
    display: inline-block;
    background: rgba(63,185,80,0.15);
    color: var(--accent2);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* Right Panel */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }

  .tab {
    padding: 12px 20px;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: inherit;
  }

  .tab:hover {
    color: var(--text);
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .toolbar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }

  .toolbar input:focus {
    border-color: var(--accent);
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--border);
  }

  .btn-primary {
    background: rgba(88,166,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-primary:hover {
    background: rgba(88,166,255,0.25);
  }

  .btn-success {
    background: rgba(63,185,80,0.15);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Content Area */
  .content-area {
    flex: 1;
    overflow: auto;
    padding: 20px;
  }

  /* JSON Viewer */
  .json-viewer {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .json-key { color: #79c0ff; }
  .json-string { color: #a5d6ff; }
  .json-number { color: #f0883e; }
  .json-boolean { color: #ff7b72; }
  .json-null { color: #8b949e; }
  .json-bracket { color: #e6edf3; }
  .json-comma { color: #8b949e; }

  .json-collapsible {
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .json-collapsible::before {
    content: '▾';
    display: inline-block;
    width: 16px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .json-collapsible.collapsed::before {
    transform: rotate(-90deg);
  }

  .json-collapsible.collapsed + .json-content {
    display: none;
  }

  .json-collapsed-preview {
    color: var(--text-dim);
    font-style: italic;
    display: none;
  }

  .json-collapsible.collapsed .json-collapsed-preview {
    display: inline;
  }

  /* Summary View */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .page-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
  }

  .page-table th,
  .page-table td {
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .page-table th {
    background: var(--surface);
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  .page-table tr:hover td {
    background: rgba(88,166,255,0.03);
  }

  /* Text View */
  .text-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .page-divider {
    margin: 24px 0;
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Empty State */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }

  .empty-state .icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state h2 {
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 14px;
    max-width: 300px;
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-radius: 10px;
    padding: 14px 24px;
    font-size: 14px;
    color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.error {
    border-color: var(--danger);
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }

  ::-webkit-scrollbar-track {
    background: var(--bg);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
  }

  /* Responsive */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      height: auto;
    }
    .left-panel {
      max-height: 400px;
    }
    .right-panel {
      min-height: 60vh;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>PDF2JSON</h1>
    <span class="subtitle">Upload PDFs and view parsed JSON data</span>
  </div>
  <span class="header-badge">v4.0.2</span>
</div>

<div class="main">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="panel-section">
      <h3>Upload PDF</h3>
      <div class="upload-area" id="uploadArea">
        <span class="upload-icon">📄</span>
        <div class="upload-text">Drop PDF here or click to browse</div>
        <div class="upload-hint">Max 50MB &middot; PDF files only</div>
        <input type="file" accept=".pdf" class="upload-input" id="fileInput">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="panel-section" style="padding-bottom: 10px;">
      <h3>Converted Files</h3>
    </div>

    <div class="conversion-list" id="conversionList">
      <!-- populated dynamically -->
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="tabs" id="tabBar">
      <button class="tab active" data-tab="summary">Summary</button>
      <button class="tab" data-tab="json">JSON</button>
      <button class="tab" data-tab="text">Extracted Text</button>
    </div>

    <div class="toolbar" id="toolbar" style="display: none;">
      <input type="text" placeholder="Search in JSON..." id="searchInput">
      <button class="btn btn-primary" id="downloadBtn">⬇ Download JSON</button>
      <button class="btn" id="copyBtn">📋 Copy</button>
    </div>

    <div class="content-area" id="contentArea">
      <div class="empty-state" id="emptyState">
        <div class="icon">📑</div>
        <h2>No PDF Selected</h2>
        <p>Upload a PDF file to parse it into JSON and view the structured data</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const progressBar = document.getElementById('progressBar');
const conversionList = document.getElementById('conversionList');
const contentArea = document.getElementById('contentArea');
const emptyState = document.getElementById('emptyState');
const tabBar = document.getElementById('tabBar');
const toolbar = document.getElementById('toolbar');
const searchInput = document.getElementById('searchInput');
const downloadBtn = document.getElementById('downloadBtn');
const copyBtn = document.getElementById('copyBtn');
const toast = document.getElementById('toast');

let currentId = null;
let currentData = null;
let currentTab = 'summary';
let conversions = [];

// === Upload Handling ===
uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0 && e.dataTransfer.files[0].name.toLowerCase().endsWith('.pdf')) {
    uploadFile(e.dataTransfer.files[0]);
  }
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) uploadFile(fileInput.files[0]);
});

async function uploadFile(file) {
  uploadArea.classList.add('processing');
  progressBar.style.width = '30%';

  const formData = new FormData();
  formData.append('pdf', file);

  try {
    progressBar.style.width = '60%';
    const resp = await fetch('/api/upload', { method: 'POST', body: formData });
    const result = await resp.json();

    progressBar.style.width = '100%';

    if (result.success) {
      showToast(`Parsed ${result.originalName} → ${result.jsonFileName}`);
      conversions.unshift(result);
      renderConversionList();
      selectConversion(result.id);
    } else {
      showToast(result.error || 'Upload failed', true);
    }
  } catch (err) {
    showToast('Upload failed: ' + err.message, true);
  } finally {
    setTimeout(() => {
      progressBar.style.width = '0%';
      uploadArea.classList.remove('processing');
    }, 500);
    fileInput.value = '';
  }
}

// === Conversion List ===
function renderConversionList() {
  conversionList.innerHTML = conversions.map(c => `
    <div class="conversion-item ${c.id === currentId ? 'active' : ''}" data-id="${c.id}">
      <div class="conv-name">${escapeHtml(c.originalName)}</div>
      <div class="conv-meta">
        <span>📄 ${c.pageCount} pages</span>
        <span class="conv-badge">JSON</span>
      </div>
    </div>
  `).join('');

  conversionList.querySelectorAll('.conversion-item').forEach(item => {
    item.addEventListener('click', () => selectConversion(item.dataset.id));
  });
}

async function selectConversion(id) {
  currentId = id;
  renderConversionList();

  try {
    const resp = await fetch(`/api/json/${id}`);
    currentData = await resp.json();
    toolbar.style.display = 'flex';
    emptyState.style.display = 'none';
    renderCurrentTab();
  } catch (err) {
    showToast('Failed to load JSON: ' + err.message, true);
  }
}

// === Tabs ===
tabBar.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    tabBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    renderCurrentTab();
  });
});

function renderCurrentTab() {
  if (!currentData) return;
  switch (currentTab) {
    case 'summary': renderSummary(); break;
    case 'json': renderJSON(); break;
    case 'text': renderText(); break;
  }
}

// === Summary View ===
function renderSummary() {
  const pages = currentData.Pages || [];
  let totalTexts = 0, totalFills = 0, totalImages = 0;

  pages.forEach(p => {
    totalTexts += (p.Texts || []).length;
    totalFills += (p.Fills || []).length;
    totalImages += (p.Images || []).length;
  });

  let html = `
    <div class="summary-grid">
      <div class="stat-card">
        <div class="stat-value">${pages.length}</div>
        <div class="stat-label">Pages</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${totalTexts}</div>
        <div class="stat-label">Text Elements</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${totalFills}</div>
        <div class="stat-label">Fill Elements</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${totalImages}</div>
        <div class="stat-label">Images</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${currentData.Width || 0}</div>
        <div class="stat-label">Width (units)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${(JSON.stringify(currentData).length / 1024).toFixed(1)}KB</div>
        <div class="stat-label">JSON Size</div>
      </div>
    </div>

    <h3 style="color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Page Details</h3>
    <table class="page-table">
      <thead>
        <tr>
          <th>Page</th>
          <th>Texts</th>
          <th>Fills</th>
          <th>Images</th>
          <th>Fields</th>
        </tr>
      </thead>
      <tbody>
        ${pages.map((p, i) => `
          <tr>
            <td style="color: var(--accent); font-weight: 600;">Page ${i + 1}</td>
            <td>${(p.Texts || []).length}</td>
            <td>${(p.Fills || []).length}</td>
            <td>${(p.Images || []).length}</td>
            <td>${(p.Fields || []).length > 0 ? `<span class="conv-badge">${(p.Fields || []).length}</span>` : '—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;

  contentArea.innerHTML = html;
}

// === JSON View ===
function renderJSON() {
  const container = document.createElement('div');
  container.className = 'json-viewer';
  container.innerHTML = syntaxHighlight(currentData, 0);
  contentArea.innerHTML = '';
  contentArea.appendChild(container);

  // Add collapsible handlers
  container.querySelectorAll('.json-collapsible').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      el.classList.toggle('collapsed');
    });
  });
}

function syntaxHighlight(obj, indent) {
  if (obj === null) return `<span class="json-null">null</span>`;
  if (typeof obj === 'boolean') return `<span class="json-boolean">${obj}</span>`;
  if (typeof obj === 'number') return `<span class="json-number">${obj}</span>`;
  if (typeof obj === 'string') return `<span class="json-string">"${escapeHtml(obj)}"</span>`;

  const pad = '  '.repeat(indent);
  const padInner = '  '.repeat(indent + 1);

  if (Array.isArray(obj)) {
    if (obj.length === 0) return `<span class="json-bracket">[]</span>`;

    const items = obj.map((item, i) => {
      const comma = i < obj.length - 1 ? '<span class="json-comma">,</span>' : '';
      return `${padInner}${syntaxHighlight(item, indent + 1)}${comma}`;
    });

    const preview = `${obj.length} items`;
    return `<span class="json-collapsible"><span class="json-bracket">[</span> <span class="json-collapsed-preview">${preview} ]</span></span><span class="json-content">\n${items.join('\n')}\n${pad}<span class="json-bracket">]</span></span>`;
  }

  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return `<span class="json-bracket">{}</span>`;

    const items = keys.map((key, i) => {
      const comma = i < keys.length - 1 ? '<span class="json-comma">,</span>' : '';
      return `${padInner}<span class="json-key">"${escapeHtml(key)}"</span>: ${syntaxHighlight(obj[key], indent + 1)}${comma}`;
    });

    const preview = `${keys.length} keys`;
    return `<span class="json-collapsible"><span class="json-bracket">{</span> <span class="json-collapsed-preview">${preview} }</span></span><span class="json-content">\n${items.join('\n')}\n${pad}<span class="json-bracket">}</span></span>`;
  }

  return String(obj);
}

// === Text View ===
function renderText() {
  const pages = currentData.Pages || [];
  let html = '';

  pages.forEach((page, idx) => {
    html += `<div class="page-divider">📄 Page ${idx + 1}</div>`;
    html += '<div class="text-content">';

    const texts = (page.Texts || []).map(t => {
      const runs = t.R || [];
      return runs.map(r => decodeURIComponent(r.T || '')).join('');
    });

    html += escapeHtml(texts.join('\n')) || '<span style="color: var(--text-dim);">No text content</span>';
    html += '</div>';
  });

  if (pages.length === 0) {
    html = '<div class="empty-state"><div class="icon">📝</div><h2>No Text Found</h2></div>';
  }

  contentArea.innerHTML = html;
}

// === Search ===
searchInput.addEventListener('input', () => {
  if (currentTab !== 'json' || !currentData) return;
  const query = searchInput.value.toLowerCase();
  if (!query) {
    renderJSON();
    return;
  }

  const viewer = contentArea.querySelector('.json-viewer');
  if (!viewer) return;

  // Expand all nodes first
  viewer.querySelectorAll('.json-collapsible.collapsed').forEach(el => el.classList.remove('collapsed'));

  // Simple text highlight would be too complex to implement properly with the tree structure
  // So we just ensure everything is expanded when searching
});

// === Download & Copy ===
downloadBtn.addEventListener('click', () => {
  if (!currentId) return;
  window.open(`/api/download/${currentId}`, '_blank');
});

copyBtn.addEventListener('click', async () => {
  if (!currentData) return;
  try {
    await navigator.clipboard.writeText(JSON.stringify(currentData, null, 2));
    showToast('JSON copied to clipboard!');
  } catch {
    showToast('Failed to copy', true);
  }
});

// === Utilities ===
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isError = false) {
  toast.textContent = msg;
  toast.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}
</script>
